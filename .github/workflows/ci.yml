name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Verifies the swift-tools-version: 5.7 floor up to the latest stable on Linux.
  linux:
    name: Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.7", "5.9", "6.0"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # Generates code coverage and uploads it to Codecov.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test with coverage
        run: swift test --enable-code-coverage
      - name: Export lcov
        shell: bash
        run: |
          set -euo pipefail
          bin=$(swift build --show-bin-path)
          xctest=$(find "$bin" -name '*.xctest' -print -quit)
          llvm_cov=$(command -v llvm-cov || echo "$(dirname "$(readlink -f "$(command -v swift)")")/llvm-cov")
          "$llvm_cov" export -format=lcov \
            -instr-profile "$bin/codecov/default.profdata" \
            "$xctest" \
            -ignore-filename-regex='\.build|Tests' > coverage.lcov
          wc -l coverage.lcov
      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Builds/tests against the latest stable Xcode toolchain on macOS.
  macos:
    name: macOS (latest Xcode)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
